name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY: cronv

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — GNU libc (most distros)
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: cronv-linux-x86_64.tar.gz

          # Linux — musl (Alpine, static binary)
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: cronv-linux-x86_64-musl.tar.gz
            musl: true

          # macOS — Intel
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: cronv-macos-x86_64.tar.gz

          # macOS — Apple Silicon
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: cronv-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/${{ env.BINARY }}
          tar -czf ${{ matrix.archive }} -C "$(dirname $BIN)" "$(basename $BIN)"
          sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: cronv v${{ steps.tag.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
